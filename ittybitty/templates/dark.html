<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
      color: #e0e0e0;
      background: #0a0a0f;
    }
    a { color: #4a9eff; }
    code {
      background: #1e1e2e;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #12121a;
      padding: 1rem;
      overflow-x: auto;
      border: 1px solid #1e1e2e;
    }
  </style>
</head>
<body>
  <h1>Dark Theme</h1>
  <p>A dark-themed page ready to customize.</p>
</body>
</html>
